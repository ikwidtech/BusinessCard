<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="ikwidtech — Rob McKay, CEO — 800-798-3470" />
    <meta name="theme-color" content="#0b1020" />
    <title>ikwidtech — Business Card</title>

    <link rel="preload" href="./logo.svg" as="image" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="card" aria-label="Business card">
        <header class="brand">
          <img class="logo" src="./logo.svg" alt="ikwidtech logo" />
          <div class="brandText">
            <h1 class="company">ikwidtech</h1>
            <p class="tagline">modern systems • secure delivery • reliable support</p>
          </div>
        </header>

        <hr class="rule" />

        <div class="identity">
          <div class="person">
            <div class="name">Rob McKay</div>
            <div class="title">CEO</div>
          </div>

          <a class="phone" href="tel:+18007983470" aria-label="Call 800-798-3470">
            <span class="phoneLabel">Phone</span>
            <span class="phoneNumber">800-798-3470</span>
          </a>
        </div>

        <footer class="meta">
          <span class="pill">Technology</span>
          <span class="pill">Consulting</span>
          <span class="pill">Implementation</span>
        </footer>
      </section>

      <p class="hint">Tip: save this page to your phone home screen for quick access.</p>
    </main>
  </body>
</html>
